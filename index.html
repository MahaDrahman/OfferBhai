<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OfferBhai</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>OfferBhai - Jamuna Future Park</h1>

<!-- CATEGORY -->
<div class="section">
  <h2>Select Category</h2>
  <button onclick="selectMain('clothing')">Clothing</button>
  <button onclick="selectMain('restaurant')">Food</button>
  <button onclick="selectMain('skincare')">Skincare</button>
</div>

<!-- ITEMS -->
<div class="section" id="items"></div>

<!-- FILTER -->
<div class="section">
  <h2>Discount Filter</h2>
  <select id="discountFilter">
    <option value="0">All</option>
    <option value="10">10%+</option>
    <option value="20">20%+</option>
    <option value="30">30%+</option>
    <option value="40">40%+</option>
  </select>
</div>

<!-- OFFERS -->
<div class="section" id="offers"></div>

<!-- IMPORTANT: JS must be here -->
<script src="./script.js"></script>

</body>
</html>
